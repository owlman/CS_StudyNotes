<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Noto Sans SC', 'PingFang SC', sans-serif; }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="375" y="35" fill="#0f172a" font-size="17" font-weight="700" text-anchor="middle">规模化定律：更大的模型 = 更好的性能</text>

  <!-- Chart area -->
  <g transform="translate(80, 60)">
    <!-- Y axis -->
    <line x1="50" y1="10" x2="50" y2="300" stroke="#64748b" stroke-width="1.5"/>
    <text x="45" y="15" fill="#64748b" font-size="9" text-anchor="end">高</text>
    <text x="45" y="158" fill="#64748b" font-size="9" text-anchor="end">性能</text>
    <text x="45" y="300" fill="#64748b" font-size="9" text-anchor="end">低</text>

    <!-- X axis -->
    <line x1="50" y1="300" x2="570" y2="300" stroke="#64748b" stroke-width="1.5"/>
    <text x="310" y="318" fill="#64748b" font-size="9" text-anchor="middle">模型规模（参数量 / 数据量 / 计算量）</text>

    <!-- Grid lines -->
    <line x1="50" y1="80" x2="570" y2="80" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="50" y1="150" x2="570" y2="150" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="50" y1="230" x2="570" y2="230" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- Curve 1: Small model region (flat) -->
    <path d="M 60 290 Q 130 280 200 260 Q 250 245 280 230" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>

    <!-- Curve 2: Threshold / emergence region -->
    <path d="M 280 230 Q 320 200 360 160" fill="none" stroke="#3b82f6" stroke-width="2.5"/>

    <!-- Curve 3: Scaling region -->
    <path d="M 360 160 Q 420 100 500 60" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>

    <!-- Emergence threshold mark -->
    <line x1="310" y1="215" x2="310" y2="305" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
    <circle cx="310" cy="215" r="5" fill="#f59e0b"/>

    <!-- Labels on curve -->
    <rect x="85" y="268" width="110" height="20" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="140" y="282" fill="#64748b" font-size="9" text-anchor="middle">小模型：性能增长缓慢</text>

    <rect x="287" y="120" width="100" height="20" rx="4" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
    <text x="337" y="134" fill="#d97706" font-size="9" font-weight="500" text-anchor="middle">涌现能力</text>
    <line x1="337" y1="140" x2="315" y2="210" stroke="#f59e0b" stroke-width="0.8"/>

    <rect x="395" y="75" width="120" height="20" rx="4" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="1"/>
    <text x="455" y="89" fill="#7c3aed" font-size="9" font-weight="500" text-anchor="middle">Scaling Laws 区域</text>
    <line x1="455" y1="95" x2="430" y2="130" stroke="#8b5cf6" stroke-width="0.8"/>

    <!-- 3 key variables boxes at bottom -->
    <g transform="translate(130, 340)">
      <rect x="0" y="0" width="120" height="28" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
      <text x="60" y="19" fill="#1d4ed8" font-size="10" font-weight="500" text-anchor="middle">参数数量 ↑</text>
    </g>
    <g transform="translate(280, 340)">
      <rect x="0" y="0" width="120" height="28" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
      <text x="60" y="19" fill="#047857" font-size="10" font-weight="500" text-anchor="middle">数据规模 ↑</text>
    </g>
    <g transform="translate(430, 340)">
      <rect x="0" y="0" width="120" height="28" rx="6" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
      <text x="60" y="19" fill="#b45309" font-size="10" font-weight="500" text-anchor="middle">计算量 ↑</text>
    </g>
  </g>

  <!-- Conclusion -->
  <g transform="translate(375, 462)">
    <text x="0" y="0" fill="#64748b" font-size="11" text-anchor="middle">三者同时增大比单独增大一个更有效 —— "更大 = 更好，而且好多少是可以算出来的"</text>
  </g>
</svg>
