<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1980 860">
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#eef0f2" stroke-width="0.5"/>
    </pattern>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow-cyan" markerWidth="22" markerHeight="8" refX="20" refY="4" orient="auto">
      <polygon points="0 0, 22 4, 0 8" fill="#0284c7"/>
    </marker>
    <marker id="arrow-green" markerWidth="22" markerHeight="8" refX="20" refY="4" orient="auto">
      <polygon points="0 0, 22 4, 0 8" fill="#059669"/>
    </marker>
    <marker id="arrow-violet" markerWidth="22" markerHeight="8" refX="20" refY="4" orient="auto">
      <polygon points="0 0, 22 4, 0 8" fill="#7c3aed"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;family=Kalam:wght@300;400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Noto Sans SC', monospace; }
      .hw { font-family: 'Kalam', 'Caveat', 'Comic Sans MS', cursive; font-weight: 400; }
      .hw-bold { font-family: 'Kalam', 'Caveat', 'Comic Sans MS', cursive; font-weight: 700; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#fafbfc"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

<g transform="translate(40, 0)">

  <!-- Title area -->
  <text x="95" y="60" fill="#0f172a" font-size="42" font-weight="700">图 1. 多层感知机的前向传播</text>
  <text x="95" y="98" fill="#64748b" font-size="24">以手写数字识别为例：输入一张 28×28 的灰度图 → 输出"这张图是数字几"</text>

  <!-- Layer labels -->
  <g transform="translate(0, 0)">
    <rect x="65"  y="135" width="40" height="28" rx="5" fill="#0284c7"/>
    <text x="85"  y="154" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">1</text>
    <text x="118" y="154" fill="#0f172a" font-size="21" font-weight="600">输入层</text>

    <rect x="556" y="135" width="40" height="28" rx="5" fill="#059669"/>
    <text x="576" y="154" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">2</text>
    <text x="606" y="154" fill="#0f172a" font-size="21" font-weight="600">隐藏层 1</text>

    <rect x="1056" y="135" width="40" height="28" rx="5" fill="#059669"/>
    <text x="1076" y="154" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">3</text>
    <text x="1106" y="154" fill="#0f172a" font-size="21" font-weight="600">隐藏层 2</text>

    <rect x="1571" y="135" width="40" height="28" rx="5" fill="#7c3aed"/>
    <text x="1591" y="154" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">4</text>
    <text x="1621" y="154" fill="#0f172a" font-size="21" font-weight="600">输出层</text>
  </g>

  <!-- ========== INPUT LAYER ========== -->
  <g filter="url(#shadow)">
    <rect x="65" y="175" width="420" height="350" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="65" y="175" width="420" height="44" rx="14" fill="#f0f9ff"/>
    <rect x="65" y="205" width="420" height="14" fill="#f0f9ff"/>
    <line x1="65" y1="219" x2="485" y2="219" stroke="#0284c7" stroke-width="3"/>
    <text x="255" y="203" fill="#0284c7" font-size="21" font-weight="600" text-anchor="middle">输入</text>
  </g>
  <text x="275" y="262" fill="#0f172a" font-size="38" font-weight="700" text-anchor="middle" class="hw-bold">x ∈ ℝ⁷⁸⁴</text>
  <text x="275" y="300" fill="#475569" font-size="23" text-anchor="middle">28×28 灰度图拉平后的向量</text>

  <g transform="translate(95, 340)">
    <rect x="0" y="-14" width="360" height="28" rx="4" fill="rgba(2,132,199,0.1)" stroke="#0284c7" stroke-width="1.2"/>
    <text x="8" y="7" fill="#0284c7" font-size="20">像素 1</text>
    <line x1="70" y1="0" x2="345" y2="0" stroke="rgba(2,132,199,0.3)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="315" y="7" fill="#64748b" font-size="20" text-anchor="end">像素 784</text>
  </g>

  <text x="275" y="430" fill="#94a3b8" font-size="21" text-anchor="middle" font-style="italic">训练时不参与更新</text>

  <!-- Arrow 1 -->
  <line x1="485" y1="350" x2="553" y2="350" stroke="#0284c7" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow-cyan)"/>
  <g transform="translate(524, 306)">
    <rect x="-30" y="-10" width="60" height="22" rx="4" fill="#ffffff" stroke="#0284c7" stroke-width="1"/>
    <text x="0" y="6" fill="#0284c7" font-size="14" font-weight="600" text-anchor="middle" class="hw">W⁽⁰⁾</text>
  </g>

  <!-- ========== HIDDEN LAYER 1 ========== -->
  <g filter="url(#shadow)">
    <rect x="563" y="175" width="380" height="350" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="563" y="175" width="380" height="44" rx="14" fill="#f0fdf4"/>
    <rect x="563" y="205" width="380" height="14" fill="#f0fdf4"/>
    <line x1="563" y1="219" x2="943" y2="219" stroke="#059669" stroke-width="3"/>
    <text x="753" y="203" fill="#059669" font-size="21" font-weight="600" text-anchor="middle">隐藏表示</text>
  </g>
  <text x="753" y="262" fill="#0f172a" font-size="38" font-weight="700" text-anchor="middle" class="hw-bold">h⁽¹⁾</text>
  <text x="753" y="300" fill="#475569" font-size="23" text-anchor="middle">第一层隐藏表示</text>

  <text x="753" y="356" fill="#0f172a" font-size="30" font-weight="500" text-anchor="middle" class="hw">h⁽¹⁾ = σ( W⁽⁰⁾x + b⁽⁰⁾ )</text>
  <text x="753" y="390" fill="#64748b" font-size="20" text-anchor="middle">线性投影 → ReLU 非线性激活</text>

  <g transform="translate(591, 435)">
    <circle cx="25"  cy="0" r="9" fill="#059669" opacity="0.5"/>
    <circle cx="67"  cy="0" r="9" fill="#059669" opacity="0.85"/>
    <circle cx="109" cy="0" r="9" fill="#059669" opacity="0.85"/>
    <circle cx="151" cy="0" r="9" fill="#059669" opacity="0.85"/>
    <circle cx="193" cy="0" r="9" fill="#059669" opacity="0.85"/>
    <circle cx="235" cy="0" r="9" fill="#059669" opacity="0.85"/>
    <circle cx="277" cy="0" r="9" fill="#059669" opacity="0.5"/>
  </g>
  <text x="753" y="485" fill="#94a3b8" font-size="19" text-anchor="middle" font-style="italic">（图为示意，实际维度通常为 64–512）</text>

  <!-- Arrow 2 -->
  <line x1="943" y1="350" x2="1011" y2="350" stroke="#059669" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow-green)"/>
  <g transform="translate(982, 306)">
    <rect x="-30" y="-10" width="60" height="22" rx="4" fill="#ffffff" stroke="#059669" stroke-width="1"/>
    <text x="0" y="6" fill="#059669" font-size="14" font-weight="600" text-anchor="middle" class="hw">W⁽¹⁾</text>
  </g>

  <!-- ========== HIDDEN LAYER 2 ========== -->
  <g filter="url(#shadow)">
    <rect x="1021" y="175" width="380" height="350" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="1021" y="175" width="380" height="44" rx="14" fill="#f0fdf4"/>
    <rect x="1021" y="205" width="380" height="14" fill="#f0fdf4"/>
    <line x1="1021" y1="219" x2="1401" y2="219" stroke="#059669" stroke-width="3"/>
    <text x="1211" y="203" fill="#059669" font-size="21" font-weight="600" text-anchor="middle">隐藏表示</text>
  </g>
  <text x="1211" y="262" fill="#0f172a" font-size="38" font-weight="700" text-anchor="middle" class="hw-bold">h⁽²⁾</text>
  <text x="1211" y="300" fill="#475569" font-size="23" text-anchor="middle">第二层隐藏表示</text>

  <text x="1211" y="356" fill="#0f172a" font-size="30" font-weight="500" text-anchor="middle" class="hw">h⁽²⁾ = σ( W⁽¹⁾h⁽¹⁾ + b⁽¹⁾ )</text>
  <text x="1211" y="390" fill="#64748b" font-size="20" text-anchor="middle">线性投影 → ReLU 非线性激活</text>

  <g transform="translate(1049, 435)">
    <circle cx="25"  cy="0" r="9" fill="#059669" opacity="0.5"/>
    <circle cx="67"  cy="0" r="9" fill="#059669" opacity="0.85"/>
    <circle cx="109" cy="0" r="9" fill="#059669" opacity="0.85"/>
    <circle cx="151" cy="0" r="9" fill="#059669" opacity="0.85"/>
    <circle cx="193" cy="0" r="9" fill="#059669" opacity="0.85"/>
    <circle cx="235" cy="0" r="9" fill="#059669" opacity="0.85"/>
    <circle cx="277" cy="0" r="9" fill="#059669" opacity="0.5"/>
  </g>
  <text x="1211" y="485" fill="#94a3b8" font-size="19" text-anchor="middle" font-style="italic">（图为示意，实际维度通常为 64–512）</text>

  <!-- Arrow 3 -->
  <line x1="1401" y1="350" x2="1469" y2="350" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow-violet)"/>
  <g transform="translate(1440, 306)">
    <rect x="-30" y="-10" width="60" height="22" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
    <text x="0" y="6" fill="#7c3aed" font-size="14" font-weight="600" text-anchor="middle" class="hw">W⁽²⁾</text>
  </g>

  <!-- ========== OUTPUT LAYER ========== -->
  <g filter="url(#shadow)">
    <rect x="1479" y="175" width="420" height="350" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="1479" y="175" width="420" height="44" rx="14" fill="#faf5ff"/>
    <rect x="1479" y="205" width="420" height="14" fill="#faf5ff"/>
    <line x1="1479" y1="219" x2="1899" y2="219" stroke="#7c3aed" stroke-width="3"/>
    <text x="1689" y="203" fill="#7c3aed" font-size="21" font-weight="600" text-anchor="middle">预测</text>
  </g>
  <text x="1689" y="262" fill="#0f172a" font-size="38" font-weight="700" text-anchor="middle" class="hw-bold">ŷ ∈ ℝ¹⁰</text>
  <text x="1689" y="300" fill="#475569" font-size="23" text-anchor="middle">10 个类别的预测概率</text>

  <text x="1689" y="356" fill="#0f172a" font-size="28" font-weight="500" text-anchor="middle" class="hw">ŷ = softmax( W⁽²⁾h⁽²⁾ + b⁽²⁾ )</text>
  <text x="1689" y="390" fill="#64748b" font-size="20" text-anchor="middle">线性投影 → Softmax 概率归一化</text>

  <!-- Probability bars -->
  <g transform="translate(1531, 435)">
    <rect x="0"   y="0" width="30" height="10" rx="1.5" fill="rgba(124,58,237,0.25)" stroke="#7c3aed" stroke-width="1"/><text x="0"   y="-8" fill="#475569" font-size="18" text-anchor="middle">0</text>
    <rect x="32"  y="0" width="30" height="10" rx="1.5" fill="rgba(124,58,237,0.25)" stroke="#7c3aed" stroke-width="1"/><text x="32"  y="-8" fill="#475569" font-size="18" text-anchor="middle">1</text>
    <rect x="64"  y="0" width="30" height="10" rx="1.5" fill="rgba(124,58,237,0.25)" stroke="#7c3aed" stroke-width="1"/><text x="64"  y="-8" fill="#475569" font-size="18" text-anchor="middle">2</text>
    <rect x="96"  y="0" width="30" height="10" rx="1.5" fill="rgba(124,58,237,0.25)" stroke="#7c3aed" stroke-width="1"/><text x="96"  y="-8" fill="#475569" font-size="18" text-anchor="middle">3</text>
    <rect x="128" y="0" width="30" height="10" rx="1.5" fill="rgba(124,58,237,0.25)" stroke="#7c3aed" stroke-width="1"/><text x="128" y="-8" fill="#475569" font-size="18" text-anchor="middle">4</text>
    <rect x="160" y="0" width="30" height="10" rx="1.5" fill="rgba(124,58,237,0.25)" stroke="#7c3aed" stroke-width="1"/><text x="160" y="-8" fill="#475569" font-size="18" text-anchor="middle">5</text>
    <rect x="192" y="0" width="30" height="10" rx="1.5" fill="rgba(124,58,237,0.25)" stroke="#7c3aed" stroke-width="1"/><text x="192" y="-8" fill="#475569" font-size="18" text-anchor="middle">6</text>
    <rect x="224" y="0" width="30" height="52" rx="1.5" fill="rgba(124,58,237,0.9)" stroke="#7c3aed" stroke-width="2"/><text x="224" y="-8" fill="#7c3aed" font-size="20" font-weight="700">7</text><text x="239" y="70" fill="#7c3aed" font-size="19" font-weight="700" text-anchor="middle" class="hw">argmax</text>
    <rect x="256" y="0" width="30" height="10" rx="1.5" fill="rgba(124,58,237,0.25)" stroke="#7c3aed" stroke-width="1"/><text x="256" y="-8" fill="#475569" font-size="18" text-anchor="middle">8</text>
    <rect x="288" y="0" width="30" height="10" rx="1.5" fill="rgba(124,58,237,0.25)" stroke="#7c3aed" stroke-width="1"/><text x="288" y="-8" fill="#475569" font-size="18" text-anchor="middle">9</text>
  </g>

  <!-- Legend -->
  <g transform="translate(65, 555)">
    <rect x="0" y="-16" width="26" height="26" rx="4" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
    <text x="40" y="4" fill="#334155" font-size="22">输入层 (fixed)</text>
    <line x1="220" y1="0" x2="245" y2="0" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="270" y="-16" width="26" height="26" rx="4" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="310" y="4" fill="#334155" font-size="22">隐藏层 (learned)</text>
    <line x1="510" y1="0" x2="535" y2="0" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="560" y="-16" width="26" height="26" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="600" y="4" fill="#334155" font-size="22">输出层 (learned)</text>
    <line x1="800" y1="0" x2="825" y2="0" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="855" cy="0" r="10" fill="#059669" opacity="0.8"/>
    <text x="880" y="4" fill="#334155" font-size="22">神经元节点</text>
  </g>

  <!-- Supplementary notes -->
  <g transform="translate(65, 605)">
    <rect x="0" y="0" width="1770" height="110" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="24" y="30" fill="#0f172a" font-size="24" font-weight="700">💡 补充说明</text>

    <g transform="translate(24, 56)">
      <rect x="0" y="0" width="560" height="46" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <text x="16" y="18" fill="#0284c7" font-size="17" font-weight="600">人脑类比</text>
      <text x="16" y="40" fill="#475569" font-size="16">每个圆圈 ≈ 一个判断单元，每条线 ≈ 判断依据。大量单元协作产生智能</text>
    </g>
    <g transform="translate(600, 56)">
      <rect x="0" y="0" width="570" height="46" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <text x="16" y="18" fill="#059669" font-size="17" font-weight="600">生活类比</text>
      <text x="16" y="40" fill="#475569" font-size="16">教孩子认字：看多了就学会区分"2"和"7"。神经网络也在做同样的事</text>
    </g>
    <g transform="translate(1186, 56)">
      <rect x="0" y="0" width="570" height="46" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <text x="16" y="18" fill="#7c3aed" font-size="17" font-weight="600">注意</text>
      <text x="16" y="40" fill="#475569" font-size="16">灵感来自生物大脑，但工作方式差异巨大——更接近统计模式识别</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(0, 760)">
    <line x1="95" y1="0" x2="1805" y2="0" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="950" y="24" fill="#475569" font-size="23" text-anchor="middle" font-style="italic">神经网络 = 一张可微的计算图；训练 = 调整图中的参数使其逼近目标函数</text>
    <text x="950" y="58" fill="#64748b" font-size="20" text-anchor="middle" font-style="italic">每层 = 一次"线性投影 + 非线性激活"——非线性激活是"深度"有意义的关键</text>
  </g>
  </g>
</svg>
