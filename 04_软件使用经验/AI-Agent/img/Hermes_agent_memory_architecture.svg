<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 850">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>

    <!-- Standard arrowhead -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>

    <!-- Open arrowhead (bidirectional) -->
    <marker id="arrow-bi-violet" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polyline points="10 0, 0 3.5, 10 7" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-bi-amber" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polyline points="10 0, 0 3.5, 10 7" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    </marker>

    <!-- Glow filter for emphasis -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- ============================================================ -->
  <!-- TITLE -->
  <!-- ============================================================ -->
  <text x="30" y="36" fill="#f8fafc" font-size="20" font-weight="700">Hermes Agent 记忆体系架构</text>
  <text x="30" y="58" fill="#94a3b8" font-size="12" font-weight="400">分层缓存式记忆 · 闭环技能进化系统</text>

  <!-- ============================================================ -->
  <!-- REGION 1: 用户接入层 (y=80..178) -->
  <!-- ============================================================ -->
  <rect x="30" y="80" width="845" height="98" rx="10" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="42" y="100" fill="#fbbf24" font-size="10" font-weight="600">用户接入层</text>

  <!-- Mask rects -->
  <rect x="165" y="108" width="230" height="52" rx="6" fill="#0f172a"/>
  <rect x="445" y="108" width="270" height="52" rx="6" fill="#0f172a"/>

  <!-- Component 1: Hermes TUI -->
  <rect x="165" y="108" width="230" height="52" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="280" y="132" fill="white" font-size="12" font-weight="600" text-anchor="middle">Hermes TUI / CLI</text>
  <text x="280" y="148" fill="#94a3b8" font-size="9" text-anchor="middle">命令行对话界面</text>

  <!-- Component 2: Messaging Gateway -->
  <rect x="445" y="108" width="270" height="52" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="580" y="132" fill="white" font-size="12" font-weight="600" text-anchor="middle">统一消息网关</text>
  <text x="580" y="148" fill="#94a3b8" font-size="9" text-anchor="middle">微信 · 飞书 · Slack · Discord · Telegram</text>

  <!-- Connection label: multi-platform -->
  <text x="410" y="126" fill="#94a3b8" font-size="8" text-anchor="middle">＋</text>

  <!-- ============================================================ -->
  <!-- ARROW R1 → R2 -->
  <!-- ============================================================ -->
  <path d="M 395 160 L 395 223" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- REGION 2: 核心记忆层 L1-L2 (y=210..308) -->
  <!-- ============================================================ -->
  <rect x="30" y="210" width="845" height="98" rx="10" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="42" y="230" fill="#60a5fa" font-size="10" font-weight="600">核心记忆层 L1-L2</text>

  <!-- Mask rects -->
  <rect x="165" y="235" width="230" height="55" rx="6" fill="#0f172a"/>
  <rect x="445" y="235" width="230" height="55" rx="6" fill="#0f172a"/>

  <!-- Component 3: L1 Core Memory -->
  <rect x="165" y="235" width="230" height="55" rx="6" fill="#0f172a"/>
  <rect x="165" y="235" width="230" height="55" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="280" y="258" fill="white" font-size="12" font-weight="600" text-anchor="middle">L1 · 核心记忆</text>
  <text x="280" y="274" fill="#94a3b8" font-size="9" text-anchor="middle">MEMORY.md · 限制 800 tokens</text>

  <!-- Component 4: L2 User Profile -->
  <rect x="445" y="235" width="230" height="55" rx="6" fill="#0f172a"/>
  <rect x="445" y="235" width="230" height="55" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="560" y="258" fill="white" font-size="12" font-weight="600" text-anchor="middle">L2 · 用户画像</text>
  <text x="560" y="274" fill="#94a3b8" font-size="9" text-anchor="middle">USER.md · ~500 tokens</text>

  <!-- Annotation: always loaded -->
  <rect x="320" y="217" width="160" height="16" rx="8" fill="rgba(59,130,246,0.15)" stroke="#60a5fa" stroke-width="0.8" opacity="0.8"/>
  <text x="400" y="228" fill="#60a5fa" font-size="8" font-weight="600" text-anchor="middle">始终加载 · 注入系统提示词</text>

  <!-- ============================================================ -->
  <!-- ARROW R2 → R3 -->
  <!-- ============================================================ -->
  <path d="M 395 290 L 395 348" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="406" y="322" fill="#94a3b8" font-size="8" font-weight="500">注入上下文</text>

  <!-- ============================================================ -->
  <!-- REGION 3: LLM 推理层 (y=340..433) -->
  <!-- ============================================================ -->
  <rect x="30" y="340" width="845" height="93" rx="10" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="42" y="360" fill="#22d3ee" font-size="10" font-weight="600">LLM 推理层</text>

  <!-- Mask rect -->
  <rect x="195" y="365" width="400" height="50" rx="6" fill="#0f172a"/>

  <!-- Component 5: LLM Engine -->
  <rect x="195" y="365" width="400" height="50" rx="6" fill="#0f172a"/>
  <rect x="195" y="365" width="400" height="50" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="395" y="389" fill="white" font-size="12" font-weight="600" text-anchor="middle">LLM 推理引擎</text>
  <text x="395" y="403" fill="#94a3b8" font-size="9" text-anchor="middle">长上下文窗口 · 注入 L1+L2 记忆</text>

  <!-- ============================================================ -->
  <!-- ARROW R3 → R4 -->
  <!-- ============================================================ -->
  <path d="M 395 415 L 395 473" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="406" y="448" fill="#94a3b8" font-size="8" font-weight="500">按需检索</text>

  <!-- ============================================================ -->
  <!-- REGION 4: 持久记忆层 L3 (y=465..563) -->
  <!-- ============================================================ -->
  <rect x="30" y="465" width="845" height="98" rx="10" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="42" y="485" fill="#a78bfa" font-size="10" font-weight="600">持久记忆层 L3</text>

  <!-- Mask rects -->
  <rect x="165" y="490" width="230" height="55" rx="6" fill="#0f172a"/>
  <rect x="445" y="490" width="230" height="55" rx="6" fill="#0f172a"/>

  <!-- Component 6: L3 Session Memory -->
  <rect x="165" y="490" width="230" height="55" rx="6" fill="#0f172a"/>
  <rect x="165" y="490" width="230" height="55" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="280" y="513" fill="white" font-size="12" font-weight="600" text-anchor="middle">L3 · 会话记忆</text>
  <text x="280" y="529" fill="#94a3b8" font-size="9" text-anchor="middle">SQLite · FTS5 全文索引</text>

  <!-- Component 7: session_search -->
  <rect x="445" y="490" width="230" height="55" rx="6" fill="#0f172a"/>
  <rect x="445" y="490" width="230" height="55" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="560" y="513" fill="white" font-size="12" font-weight="600" text-anchor="middle">session_search 检索</text>
  <text x="560" y="529" fill="#94a3b8" font-size="9" text-anchor="middle">毫秒级语义检索</text>

  <!-- Bidirectional arrow between L3 and session_search -->
  <path d="M 395 517 L 440 517" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <path d="M 440 507 L 395 507" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-bi-violet)"/>

  <!-- ============================================================ -->
  <!-- ARROW R4 → R5 -->
  <!-- ============================================================ -->
  <path d="M 395 545 L 395 603" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="406" y="578" fill="#94a3b8" font-size="8" font-weight="500">经验提取</text>

  <!-- ============================================================ -->
  <!-- REGION 5: 技能沉淀层 L4 (y=595..693) -->
  <!-- ============================================================ -->
  <rect x="30" y="595" width="845" height="98" rx="10" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="42" y="615" fill="#34d399" font-size="10" font-weight="600">技能沉淀层 L4</text>

  <!-- Mask rects -->
  <rect x="165" y="620" width="230" height="55" rx="6" fill="#0f172a"/>
  <rect x="445" y="620" width="230" height="55" rx="6" fill="#0f172a"/>

  <!-- Component 8: L4 Skill System -->
  <rect x="165" y="620" width="230" height="55" rx="6" fill="#0f172a"/>
  <rect x="165" y="620" width="230" height="55" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="280" y="643" fill="white" font-size="12" font-weight="600" text-anchor="middle">L4 · 技能系统</text>
  <text x="280" y="659" fill="#94a3b8" font-size="9" text-anchor="middle">~/.hermes/skills/ 目录</text>

  <!-- Component 9: Skills Repository -->
  <rect x="445" y="620" width="230" height="55" rx="6" fill="#0f172a"/>
  <rect x="445" y="620" width="230" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="560" y="643" fill="white" font-size="12" font-weight="600" text-anchor="middle">Skills 仓库</text>
  <text x="560" y="659" fill="#94a3b8" font-size="9" text-anchor="middle">内置 70+ · Skills Hub 扩展</text>

  <!-- Arrow: Skills Hub → Skills 仓库 -->
  <path d="M 675 647 L 730 647" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="702" y="640" fill="#fbbf24" font-size="8" text-anchor="middle">安装</text>

  <!-- Skills Hub external icon -->
  <rect x="735" y="625" width="85" height="45" rx="20" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="777" y="652" fill="#fbbf24" font-size="9" font-weight="600" text-anchor="middle">Skills Hub</text>

  <!-- ============================================================ -->
  <!-- ARROW R5 → FEEDBACK -->
  <!-- ============================================================ -->
  <path d="M 395 675 L 395 733" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- BOTTOM: 闭环优化 (y=725..780) -->
  <!-- ============================================================ -->
  <rect x="30" y="725" width="845" height="55" rx="10" fill="none" stroke="#fb7185" stroke-width="1" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="42" y="742" fill="#fb7185" font-size="10" font-weight="600">闭环优化</text>

  <!-- Mask rect -->
  <rect x="195" y="737" width="400" height="36" rx="6" fill="#0f172a"/>

  <!-- Component 10: DSPy + GEPA -->
  <rect x="195" y="737" width="400" height="36" rx="6" fill="#0f172a"/>
  <rect x="195" y="737" width="400" height="36" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="395" y="759" fill="white" font-size="11" font-weight="600" text-anchor="middle">DSPy + GEPA · 遗传帕累托提示进化</text>

  <!-- ============================================================ -->
  <!-- FEEDBACK LOOP (right side) -->
  <!-- ============================================================ -->
  <!-- Feedback path: from bottom → up the right → back to R1 -->
  <!-- Bottom → right edge -->
  <path d="M 595 755 L 870 755 L 870 134 L 715 134"
        fill="none" stroke="#fb7185" stroke-width="1.8" stroke-dasharray="6,4"
        marker-end="url(#arrow-rose)" opacity="0.8"/>

  <!-- Feedback label 1: 自动进化 -->
  <rect x="855" y="460" width="24" height="110" rx="4" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="0.8"/>
  <text x="867" y="475" fill="#fb7185" font-size="9" font-weight="500" text-anchor="middle">
    <tspan x="867" dy="0">自</tspan>
    <tspan x="867" dy="12">动</tspan>
    <tspan x="867" dy="12">进</tspan>
    <tspan x="867" dy="12">化</tspan>
  </text>

  <!-- Feedback annotation dots along path -->
  <circle cx="870" cy="700" r="3" fill="#fb7185" opacity="0.5"/>
  <circle cx="870" cy="650" r="3" fill="#fb7185" opacity="0.5"/>
  <circle cx="870" cy="600" r="3" fill="#fb7185" opacity="0.5"/>
  <circle cx="870" cy="550" r="3" fill="#fb7185" opacity="0.5"/>
  <circle cx="870" cy="500" r="3" fill="#fb7185" opacity="0.5"/>
  <circle cx="870" cy="400" r="3" fill="#fb7185" opacity="0.5"/>
  <circle cx="870" cy="350" r="3" fill="#fb7185" opacity="0.5"/>
  <circle cx="870" cy="300" r="3" fill="#fb7185" opacity="0.5"/>
  <circle cx="870" cy="250" r="3" fill="#fb7185" opacity="0.5"/>
  <circle cx="870" cy="200" r="3" fill="#fb7185" opacity="0.5"/>

  <!-- ============================================================ -->
  <!-- LEFT SIDE: Layer hierarchy annotations -->
  <!-- ============================================================ -->

  <!-- CPU Cache comparison bar on left edge -->
  <rect x="5" y="100" width="18" height="680" rx="9" fill="rgba(251,191,36,0.08)" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="14" y="200" fill="#fbbf24" font-size="8" font-weight="500" text-anchor="middle" opacity="0.6" transform="rotate(-90, 14, 440)">
    缓存层级递进 · 容量递增 · 访问频率递减
  </text>

  <!-- L1 icon (fast) -->
  <circle cx="14" cy="262" r="6" fill="rgba(96,165,250,0.4)" stroke="#60a5fa" stroke-width="1"/>
  <text x="14" y="265" fill="#60a5fa" font-size="7" font-weight="700" text-anchor="middle">L1</text>

  <!-- L2 icon -->
  <circle cx="14" cy="390" r="6" fill="rgba(34,211,238,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="14" y="393" fill="#22d3ee" font-size="7" font-weight="700" text-anchor="middle">L2</text>

  <!-- L3 icon -->
  <circle cx="14" cy="517" r="6" fill="rgba(167,139,250,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="14" y="520" fill="#a78bfa" font-size="7" font-weight="700" text-anchor="middle">L3</text>

  <!-- L4 icon -->
  <circle cx="14" cy="647" r="6" fill="rgba(52,211,153,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="14" y="650" fill="#34d399" font-size="7" font-weight="700" text-anchor="middle">L4</text>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <rect x="610" y="797" width="265" height="40" rx="6" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="0.8"/>
  <text x="622" y="815" fill="#94a3b8" font-size="8" font-weight="500">图例：</text>
  <circle cx="662" cy="811" r="4" fill="rgba(59,130,246,0.4)" stroke="#60a5fa" stroke-width="1"/>
  <text x="670" y="814" fill="#94a3b8" font-size="7">L1-L2 高频记忆</text>
  <circle cx="742" cy="811" r="4" fill="rgba(167,139,250,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="750" y="814" fill="#94a3b8" font-size="7">L3 持久记忆</text>
  <circle cx="808" cy="811" r="4" fill="rgba(52,211,153,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="816" y="814" fill="#94a3b8" font-size="7">L4 技能</text>

  <!-- ============================================================ -->
  <!-- CAPACITY SIZE INDICATORS -->
  <!-- ============================================================ -->
  <!-- Small bar next to L1 -->
  <rect x="400" y="235" width="6" height="55" rx="2" fill="rgba(96,165,250,0.3)" stroke="#60a5fa" stroke-width="0.5"/>
  <!-- Small bar next to L3 -->
  <rect x="400" y="490" width="12" height="55" rx="2" fill="rgba(167,139,250,0.3)" stroke="#a78bfa" stroke-width="0.5"/>
  <!-- Small bar next to L4 -->
  <rect x="400" y="620" width="18" height="55" rx="2" fill="rgba(52,211,153,0.3)" stroke="#34d399" stroke-width="0.5"/>

</svg>
